# ─────────────────────────────────────────────────────────────────────────────
# BEAST X — Release workflow
#
# Triggered by pushing a version tag (e.g. v10.5.1 or v10.5.1-beta4).
#
# Jobs
# ────
#  build-jars        ubuntu-latest   Compile Java sources, upload beast.jar /
#                                    beauti.jar as a reusable artifact.
#
#  package           macos-latest    Download JARs, produce Mac and Linux packages:
#                                      • Mac   – .app bundles → three traditional DMGs
#                                              (no JVM / Zulu 21 universal JVM /
#                                               Temurin 21 arm64 JVM + BEAGLE) → notarised
#                                              + one experimental jpackage arm64 DMG
#                                      • Linux – shell scripts + JARs → GNU-tar TGZ
#
#  windows-package   windows-latest  jpackage app-image with bundled Temurin 21
#                                    JRE; BEAST, BEAUTi, TreeAnnotator and
#                                    LogCombiner share one runtime → ZIP
#
#  release           ubuntu-latest   Create a (draft) GitHub Release and attach
#                                    the four platform archives.
#
# Required GitHub repository secrets
# ────────────────────────────────────
#  MACOS_APP_CERT                Base64-encoded Developer ID Application .p12
#                                  openssl pkcs12 -export ... | base64 | pbcopy
#  MACOS_APP_CERT_PASSWORD       Password used when exporting the .p12
#  MACOS_INSTALLER_CERT          Base64-encoded Developer ID Installer .p12
#                                  (used to sign the final DMG file)
#  MACOS_INSTALLER_CERT_PASSWORD Password for the installer .p12
#  KEYCHAIN_PASSWORD             Any random string; used for the temporary
#                                  CI keychain (never leaves the runner)
#  APPLE_NOTARIZE_APPLE_ID       Apple ID email address (e.g. user@example.com)
#  APPLE_NOTARIZE_TEAM_ID        10-character Apple Team ID (e.g. LC992Z5R7E)
#  APPLE_NOTARIZE_PASSWORD       App-specific password from appleid.apple.com
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v*'

# Only one release pipeline runs at a time; a newer tag cancels the old one.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # 1. Compile Java sources and upload the JARs as an artifact.
  #    Using the cheapest runner for the CPU-heavy compilation step.
  # ───────────────────────────────────────────────────────────────────────────
  build-jars:
    name: Build JARs
    runs-on: ubuntu-latest

    outputs:
      version:       ${{ steps.parse-tag.outputs.version }}
      version_number: ${{ steps.parse-tag.outputs.version_number }}
      extra_tag:     ${{ steps.parse-tag.outputs.extra_tag }}

    steps:
      - uses: actions/checkout@v4

      # Java 11 is used for compilation; source/target compatibility is set to
      # 1.8 inside build.xml so the output JARs run on Java 8+.
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Parse the tag into its component parts:
      #   v10.5.1-beta4  →  version=10.5.1  extra_tag=-beta4
      #   v10.5.1        →  version=10.5.1  extra_tag=
      - name: Parse version from tag
        id: parse-tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="${TAG%%-*}"          # everything before the first hyphen
          if [[ "$TAG" == *"-"* ]]; then
            EXTRA_TAG="-${TAG#*-}"     # everything after the first hyphen
          else
            EXTRA_TAG=""
          fi
          echo "version=$VERSION"        >> "$GITHUB_OUTPUT"
          echo "version_number=$VERSION" >> "$GITHUB_OUTPUT"
          echo "extra_tag=$EXTRA_TAG"    >> "$GITHUB_OUTPUT"
          echo "Parsed: version=$VERSION  extra_tag=$EXTRA_TAG"

      - name: Build JARs (ant dist)
        run: |
          ant -f build.xml dist \
            -Dversion="${{ steps.parse-tag.outputs.version }}" \
            -Dversion_number="${{ steps.parse-tag.outputs.version_number }}"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: beast-jars
          path: build/dist/
          retention-days: 1


  # ───────────────────────────────────────────────────────────────────────────
  # 2. Build Mac and Linux packages on a macOS runner.
  #
  #    • GNU tar format is used for the Linux archive (set in build_release.xml)
  #      so the tarball is compatible with Linux GNU tar regardless of the host.
  #    • Mac .app bundles are signed with Hardened Runtime (--options runtime)
  #      and a custom entitlements plist so Apple's notarisation service accepts
  #      them.
  # ───────────────────────────────────────────────────────────────────────────
  package:
    name: Package (Mac · Linux)
    needs: build-jars
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11 (ANT runtime)
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Restore the JARs built in job 1
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: beast-jars
          path: build/dist/

      # ── Convenience variables ──────────────────────────────────
      - name: Set version env vars
        run: |
          echo "VERSION=${{ needs.build-jars.outputs.version }}"                  >> "$GITHUB_ENV"
          echo "VERSION_NUMBER=${{ needs.build-jars.outputs.version_number }}"    >> "$GITHUB_ENV"
          echo "EXTRA_TAG=${{ needs.build-jars.outputs.extra_tag }}"              >> "$GITHUB_ENV"

      # ── Linux packaging ────────────────────────────────────────
      - name: Package Linux (TGZ)
        run: |
          ant -f build_release.xml package-linux \
            -Dversion="$VERSION" \
            -Dversion_number="$VERSION_NUMBER" \
            -Dextra_release_tag="$EXTRA_TAG" \
            -Ddist.dir=build/dist

      # ── Install Zulu 21 Universal JDK for embedding ───────────
      #
      # Azul Zulu's Homebrew cask installs a macOS universal binary
      # (fat binary containing both aarch64 and x86_64 slices).
      # macOS loads only the native slice at runtime, so the bundled JDK
      # is natively fast on both Apple Silicon and Intel with no Rosetta
      # overhead — and a single DMG covers both architectures.
      - name: Install Zulu 21 Universal JDK for bundling
        run: |
          brew install --cask zulu@21
          echo "JDK_BUNDLE_DIR=/Library/Java/JavaVirtualMachines/zulu-21.jdk" >> "$GITHUB_ENV"

      # ── Install Temurin 21 arm64 and build BEAGLE ─────────────
      #
      # The arm64-only DMG embeds:
      #   • Eclipse Temurin 21 (aarch64-only, smaller than the universal Zulu)
      #   • BEAGLE native library built for Apple Silicon
      # Both are installed / built up-front so they are ready when needed.
      - name: Install Temurin 21 (arm64) for Apple Silicon bundling
        run: |
          brew install --cask temurin@21
          echo "ARM64_JDK_DIR=/Library/Java/JavaVirtualMachines/temurin-21.jdk" >> "$GITHUB_ENV"

      - name: Build BEAGLE library for Apple Silicon
        run: |
          BEAGLE_SRC="$RUNNER_TEMP/beagle-src"
          BEAGLE_BUILD="$RUNNER_TEMP/beagle-build"
          git clone --depth=1 https://github.com/beagle-dev/beagle-lib.git "$BEAGLE_SRC"
          mkdir -p "$BEAGLE_BUILD"
          cd "$BEAGLE_BUILD"
          cmake "$BEAGLE_SRC" \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_OPENCL=OFF
          make -j$(sysctl -n hw.logicalcpu)
          echo "BEAGLE_BUILD_DIR=$BEAGLE_BUILD" >> "$GITHUB_ENV"

      # ── Mac code-signing setup ─────────────────────────────────
      #
      # We import both certificates into a short-lived keychain that only
      # exists for the duration of this job.  All secrets stay in memory;
      # the decoded .p12 files are deleted immediately after import.
      - name: Create signing keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/beast-signing.keychain-db"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Keep unlocked for up to 6 hours (the notarisation wait can be slow)
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"

      - name: Import Developer ID Application certificate
        env:
          CERT_B64:  ${{ secrets.MACOS_APP_CERT }}
          CERT_PASS: ${{ secrets.MACOS_APP_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          printf '%s' "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/app_cert.p12"
          security import "$RUNNER_TEMP/app_cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASS" \
            -T /usr/bin/codesign
          rm -f "$RUNNER_TEMP/app_cert.p12"
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Import Developer ID Installer certificate
        env:
          CERT_B64:  ${{ secrets.MACOS_INSTALLER_CERT }}
          CERT_PASS: ${{ secrets.MACOS_INSTALLER_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          printf '%s' "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/installer_cert.p12"
          security import "$RUNNER_TEMP/installer_cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASS" \
            -T /usr/bin/codesign
          rm -f "$RUNNER_TEMP/installer_cert.p12"
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      # Derive the full identity strings from the imported certs so we do not
      # have to hard-code them in the workflow or in a secret.
      - name: Resolve signing identities
        run: |
          APP_SIGNER=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" \
            | head -1 \
            | awk '{print $2}')
          echo "APP_SIGNER=$APP_SIGNER" >> "$GITHUB_ENV"
          echo "Resolved Application signer: $APP_SIGNER"

      # ── Mac packaging ──────────────────────────────────────────
      #
      # Four DMGs are produced:
      #   BEAST X v<ver>-no-jvm.dmg            — no bundled JVM (smaller; requires
      #                                          a Java installation on the user's Mac)
      #   BEAST X v<ver>.dmg                   — Zulu 21 universal JDK embedded
      #                                          (self-contained; no system Java needed;
      #                                          runs natively on both Apple Silicon
      #                                          and Intel)
      #   BEAST X v<ver>-arm64.dmg             — Temurin 21 arm64-only JDK + BEAGLE
      #                                          library built for Apple Silicon
      #                                          (best performance on M-series Macs)
      #   BEAST X v<ver>-arm64-jp.dmg          — same as above but packaged with
      #                                          jpackage instead of the traditional
      #                                          universalJavaApplicationStub launcher
      #                                          (experimental; for comparison testing)
      #
      # The same staging directory is reused between the first two:
      #   1. Create .app bundles (no JVM)
      #   2. Sign them  →  create + sign no-JVM DMG
      #   3. Embed JVM in-place (invalidates signatures)
      #   4. Re-sign    →  create + sign bundled-JVM DMG
      #   5. Notarise and staple both DMGs
      # Then a fresh set of bundles is created for the arm64 variant:
      #   6. Recreate .app bundles  →  embed Temurin arm64 JDK + BEAGLE dylibs
      #   7. Sign  →  create + sign arm64 DMG  →  notarise + staple
      # Finally a jpackage-based arm64 bundle is built:
      #   8. jpackage app-image  →  embed BEAGLE dylibs  →  sign  →  DMG  →  notarise + staple

      # Step 1: create the four .app bundles without a bundled JVM
      - name: Create Mac .app bundles (unsigned, no bundled JVM)
        run: |
          ant -f build_release.xml package-mac \
            -Dversion="$VERSION" \
            -Dversion_number="$VERSION_NUMBER" \
            -Dextra_release_tag="$EXTRA_TAG" \
            -Ddist.dir=build/dist

      # Step 2a: sign the no-JVM apps
      - name: Sign .app bundles (no bundled JVM)
        run: |
          MAC_DIR="release/Mac/BEAST X v${VERSION}"
          for APP in \
            "BEAST v${VERSION}.app" \
            "BEAUti v${VERSION}.app" \
            "LogCombiner v${VERSION}.app" \
            "TreeAnnotator v${VERSION}.app"; do
            codesign \
              --deep --force \
              --options runtime \
              --entitlements packaging_tools/mac/entitlements.plist \
              --sign "$APP_SIGNER" \
              --verbose \
              "${MAC_DIR}/${APP}"
          done

      # Step 2b: create the no-JVM DMG
      - name: Create DMG (no bundled JVM)
        run: |
          /usr/bin/hdiutil create -ov \
            -srcfolder "release/Mac/BEAST X v${VERSION}" \
            -volname "BEAST v${VERSION} (no JVM)" \
            "release/BEAST X v${VERSION}${EXTRA_TAG}-no-jvm.dmg"

      # Step 2c: sign the no-JVM DMG
      - name: Sign DMG (no bundled JVM)
        run: |
          codesign \
            --sign "$APP_SIGNER" \
            --verbose \
            "release/BEAST X v${VERSION}${EXTRA_TAG}-no-jvm.dmg"

      # Step 3: embed Zulu 21 JVM into each .app bundle in-place.
      # This adds files to Contents/PlugIns/ and sets JVMRuntime in
      # Info.plist so universalJavaApplicationStub uses the bundled JDK.
      # Embedding new files invalidates the codesign signatures; the apps
      # are re-signed in the next step.
      - name: Embed JVM into .app bundles
        run: |
          MAC_DIR="release/Mac/BEAST X v${VERSION}"
          JDK_NAME=$(basename "$JDK_BUNDLE_DIR")
          for APP in \
            "BEAST v${VERSION}.app" \
            "BEAUti v${VERSION}.app" \
            "LogCombiner v${VERSION}.app" \
            "TreeAnnotator v${VERSION}.app"; do
            mkdir -p "${MAC_DIR}/${APP}/Contents/PlugIns"
            cp -rp "$JDK_BUNDLE_DIR" "${MAC_DIR}/${APP}/Contents/PlugIns/"
            /usr/libexec/PlistBuddy \
              -c "Add :JavaX:JVMRuntime string ${JDK_NAME}" \
              "${MAC_DIR}/${APP}/Contents/Info.plist"
          done

      # Step 4a: re-sign with the bundled JDK now included
      - name: Sign .app bundles (bundled JVM)
        run: |
          MAC_DIR="release/Mac/BEAST X v${VERSION}"
          for APP in \
            "BEAST v${VERSION}.app" \
            "BEAUti v${VERSION}.app" \
            "LogCombiner v${VERSION}.app" \
            "TreeAnnotator v${VERSION}.app"; do
            codesign \
              --deep --force \
              --options runtime \
              --entitlements packaging_tools/mac/entitlements.plist \
              --sign "$APP_SIGNER" \
              --verbose \
              "${MAC_DIR}/${APP}"
          done

      # Step 4b: create the bundled-JVM DMG
      - name: Create DMG (bundled JVM)
        run: |
          /usr/bin/hdiutil create -ov \
            -srcfolder "release/Mac/BEAST X v${VERSION}" \
            -volname "BEAST v${VERSION}" \
            "release/BEAST X v${VERSION}${EXTRA_TAG}.dmg"

      # Step 4c: sign the bundled-JVM DMG
      - name: Sign DMG (bundled JVM)
        run: |
          codesign \
            --sign "$APP_SIGNER" \
            --verbose \
            "release/BEAST X v${VERSION}${EXTRA_TAG}.dmg"

      # ── Notarisation ───────────────────────────────────────────
      #
      # Both DMGs are submitted sequentially. xcrun notarytool --wait
      # blocks until Apple's service responds (typically 2-10 minutes).
      - name: Notarise DMGs
        env:
          APPLE_ID:       ${{ secrets.APPLE_NOTARIZE_APPLE_ID }}
          TEAM_ID:        ${{ secrets.APPLE_NOTARIZE_TEAM_ID }}
          NOTARIZE_PASS:  ${{ secrets.APPLE_NOTARIZE_PASSWORD }}
        run: |
          xcrun notarytool submit "release/BEAST X v${VERSION}${EXTRA_TAG}-no-jvm.dmg" \
            --apple-id "$APPLE_ID" --team-id "$TEAM_ID" --password "$NOTARIZE_PASS" \
            --wait --output-format plist
          xcrun notarytool submit "release/BEAST X v${VERSION}${EXTRA_TAG}.dmg" \
            --apple-id "$APPLE_ID" --team-id "$TEAM_ID" --password "$NOTARIZE_PASS" \
            --wait --output-format plist

      - name: Staple notarisation tickets
        run: |
          xcrun stapler staple   "release/BEAST X v${VERSION}${EXTRA_TAG}-no-jvm.dmg"
          xcrun stapler validate "release/BEAST X v${VERSION}${EXTRA_TAG}-no-jvm.dmg"
          xcrun stapler staple   "release/BEAST X v${VERSION}${EXTRA_TAG}.dmg"
          xcrun stapler validate "release/BEAST X v${VERSION}${EXTRA_TAG}.dmg"

      # ── Apple Silicon DMG (arm64 JVM + BEAGLE) ────────────────
      #
      # Steps 6-7: fresh .app bundles → embed Temurin 21 arm64 + BEAGLE dylibs
      # → update BEAST.app java.library.path → sign → DMG → notarise + staple

      # Step 6a: fresh .app bundles (no JVM) as the base for the arm64 variant
      - name: Recreate Mac .app bundles for arm64 variant
        run: |
          ant -f build_release.xml package-mac \
            -Dversion="$VERSION" \
            -Dversion_number="$VERSION_NUMBER" \
            -Dextra_release_tag="$EXTRA_TAG" \
            -Ddist.dir=build/dist

      # Step 6b: embed Temurin arm64 JDK and BEAGLE native libraries.
      # BEAGLE dylibs go into Contents/MacOS/ (the standard location for
      # native libraries inside macOS .app bundles).
      # BEAST.app's VMOptions are updated so java.library.path points to
      # $APP_PACKAGE/Contents/MacOS at runtime; the universalJavaApplicationStub
      # expands $APP_PACKAGE to the absolute bundle path via 'eval echo'.
      - name: Embed arm64 JVM and BEAGLE into .app bundles
        run: |
          MAC_DIR="release/Mac/BEAST X v${VERSION}"
          JDK_NAME=$(basename "$ARM64_JDK_DIR")
          for APP in \
            "BEAST v${VERSION}.app" \
            "BEAUti v${VERSION}.app" \
            "LogCombiner v${VERSION}.app" \
            "TreeAnnotator v${VERSION}.app"; do
            APP_DIR="${MAC_DIR}/${APP}"
            # Embed arm64 JDK
            mkdir -p "${APP_DIR}/Contents/PlugIns"
            cp -rp "$ARM64_JDK_DIR" "${APP_DIR}/Contents/PlugIns/"
            /usr/libexec/PlistBuddy \
              -c "Add :JavaX:JVMRuntime string ${JDK_NAME}" \
              "${APP_DIR}/Contents/Info.plist"
            # Copy all BEAGLE dylibs (real files and symlinks) into Contents/MacOS/
            find "$BEAGLE_BUILD_DIR" -name 'libhmsbeagle*.dylib' \
              -exec cp -P {} "${APP_DIR}/Contents/MacOS/" \;
          done
          # Point BEAST.app's java.library.path at the bundled MacOS directory.
          # IMPORTANT: use the Properties dict, NOT VMOptions, for this path.
          # The stub uses unquoted $JVMDefaultOptions for VMOptions (line 926),
          # so a path with spaces (e.g. "/Applications/BEAST v10.5.1.app/...")
          # gets word-split, breaking the java command.  Properties entries go
          # through the JVMOptionsArr array (line 925) which is properly quoted.
          # $APP_PACKAGE is a variable expanded at runtime by the stub via eval.
          /usr/libexec/PlistBuddy \
            -c 'Set :JavaX:VMOptions -Xmx2048M' \
            "${MAC_DIR}/BEAST v${VERSION}.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy \
            -c 'Add :JavaX:Properties:java.library.path string $APP_PACKAGE/Contents/MacOS' \
            "${MAC_DIR}/BEAST v${VERSION}.app/Contents/Info.plist"

      # Step 6c: sign the arm64 app bundles (--deep also signs the JDK binaries
      # and BEAGLE dylibs inside Contents/MacOS/ and Contents/PlugIns/)
      - name: Sign .app bundles (arm64 + BEAGLE)
        run: |
          MAC_DIR="release/Mac/BEAST X v${VERSION}"
          for APP in \
            "BEAST v${VERSION}.app" \
            "BEAUti v${VERSION}.app" \
            "LogCombiner v${VERSION}.app" \
            "TreeAnnotator v${VERSION}.app"; do
            codesign \
              --deep --force \
              --options runtime \
              --entitlements packaging_tools/mac/entitlements.plist \
              --sign "$APP_SIGNER" \
              --verbose \
              "${MAC_DIR}/${APP}"
          done

      # Step 7a: create the arm64 DMG
      - name: Create DMG (arm64 + BEAGLE)
        run: |
          /usr/bin/hdiutil create -ov \
            -srcfolder "release/Mac/BEAST X v${VERSION}" \
            -volname "BEAST v${VERSION} (arm64+BEAGLE)" \
            "release/BEAST X v${VERSION}${EXTRA_TAG}-arm64.dmg"

      # Step 7b: sign the arm64 DMG
      - name: Sign DMG (arm64 + BEAGLE)
        run: |
          codesign \
            --sign "$APP_SIGNER" \
            --verbose \
            "release/BEAST X v${VERSION}${EXTRA_TAG}-arm64.dmg"

      # Step 7c: notarise the arm64 DMG
      - name: Notarise DMG (arm64 + BEAGLE)
        env:
          APPLE_ID:       ${{ secrets.APPLE_NOTARIZE_APPLE_ID }}
          TEAM_ID:        ${{ secrets.APPLE_NOTARIZE_TEAM_ID }}
          NOTARIZE_PASS:  ${{ secrets.APPLE_NOTARIZE_PASSWORD }}
        run: |
          xcrun notarytool submit "release/BEAST X v${VERSION}${EXTRA_TAG}-arm64.dmg" \
            --apple-id "$APPLE_ID" --team-id "$TEAM_ID" --password "$NOTARIZE_PASS" \
            --wait --output-format plist

      # Step 7d: staple the arm64 DMG
      - name: Staple notarisation ticket (arm64 + BEAGLE)
        run: |
          xcrun stapler staple   "release/BEAST X v${VERSION}${EXTRA_TAG}-arm64.dmg"
          xcrun stapler validate "release/BEAST X v${VERSION}${EXTRA_TAG}-arm64.dmg"

      # ── jpackage arm64 DMG (experimental) ─────────────────────
      #
      # An additional arm64 package produced with jpackage instead of the
      # traditional universalJavaApplicationStub approach.  The jpackage
      # native launcher replaces the shell stub.  BEAGLE dylibs go into
      # Contents/MacOS/ and the jpackage launcher cfg is patched to set
      # java.library.path using jpackage's $APPDIR substitution variable
      # (which expands to the Contents/app/ directory at runtime, so
      # $APPDIR/../MacOS resolves to Contents/MacOS/).
      #
      # The Temurin 21 arm64 JDK already installed in step 6 provides both
      # the jpackage tool and the runtime embedded in the app-image.

      # Step 8a: build the jpackage app-image.
      - name: Build Mac arm64 app-image with jpackage
        run: |
          JPACKAGE="$ARM64_JDK_DIR/Contents/Home/bin/jpackage"
          mkdir -p jpackage-mac-input staging-mac
          cp build/dist/beast.jar  jpackage-mac-input/
          cp build/dist/beauti.jar jpackage-mac-input/
          "$JPACKAGE" \
            --type app-image \
            --name "BEAST" \
            --app-version "$VERSION" \
            --vendor "BEAST Dev Team" \
            --mac-package-identifier org.beastdev.beast \
            --input jpackage-mac-input \
            --main-jar beast.jar \
            --main-class dr.app.beast.BeastMain \
            --java-options "-Xmx8192m" \
            --add-modules java.se \
            --icon "release/common/icons/beast.icns" \
            --dest staging-mac

      # Step 8b: copy BEAGLE dylibs into Contents/MacOS/ (same directory as the
      # jpackage native launcher binary) then patch the launcher cfg file to add
      # java.library.path.  $APPDIR is expanded by the jpackage launcher at
      # runtime to the absolute path of Contents/app/, so $APPDIR/../MacOS
      # resolves to Contents/MacOS/ where the dylibs live.
      - name: Add BEAGLE dylibs and set java.library.path in jpackage app
        run: |
          APP_BUNDLE="staging-mac/BEAST.app"
          find "$BEAGLE_BUILD_DIR" -name 'libhmsbeagle*.dylib' \
            -exec cp -P {} "${APP_BUNDLE}/Contents/MacOS/" \;
          python3 -c "
          cfg = '${APP_BUNDLE}/Contents/app/BEAST.cfg'
          txt = open(cfg).read()
          txt = txt.replace('[JavaOptions]', '[JavaOptions]\n-Djava.library.path=\$APPDIR/../MacOS', 1)
          open(cfg, 'w').write(txt)
          "

      # Step 8c: sign the jpackage .app bundle with the same identity and
      # entitlements used for the other Mac bundles.
      - name: Sign jpackage .app bundle (arm64 + BEAGLE)
        run: |
          codesign \
            --deep --force \
            --options runtime \
            --entitlements packaging_tools/mac/entitlements.plist \
            --sign "$APP_SIGNER" \
            --verbose \
            "staging-mac/BEAST.app"

      # Step 8d: wrap the signed .app in a DMG.
      - name: Create DMG (jpackage arm64 + BEAGLE)
        run: |
          /usr/bin/hdiutil create -ov \
            -srcfolder staging-mac \
            -volname "BEAST v${VERSION} (arm64+BEAGLE jpackage)" \
            "release/BEAST X v${VERSION}${EXTRA_TAG}-arm64-jp.dmg"

      # Step 8e: sign the DMG.
      - name: Sign DMG (jpackage arm64 + BEAGLE)
        run: |
          codesign \
            --sign "$APP_SIGNER" \
            --verbose \
            "release/BEAST X v${VERSION}${EXTRA_TAG}-arm64-jp.dmg"

      # Step 8f: notarise and staple the jpackage DMG.
      - name: Notarise DMG (jpackage arm64 + BEAGLE)
        env:
          APPLE_ID:      ${{ secrets.APPLE_NOTARIZE_APPLE_ID }}
          TEAM_ID:       ${{ secrets.APPLE_NOTARIZE_TEAM_ID }}
          NOTARIZE_PASS: ${{ secrets.APPLE_NOTARIZE_PASSWORD }}
        run: |
          xcrun notarytool submit "release/BEAST X v${VERSION}${EXTRA_TAG}-arm64-jp.dmg" \
            --apple-id "$APPLE_ID" --team-id "$TEAM_ID" --password "$NOTARIZE_PASS" \
            --wait --output-format plist

      - name: Staple notarisation ticket (jpackage arm64 + BEAGLE)
        run: |
          xcrun stapler staple   "release/BEAST X v${VERSION}${EXTRA_TAG}-arm64-jp.dmg"
          xcrun stapler validate "release/BEAST X v${VERSION}${EXTRA_TAG}-arm64-jp.dmg"

      # ── Clean up keychain ──────────────────────────────────────
      - name: Delete signing keychain
        if: always()
        run: |
          # Restore the login keychain as default before deleting ours;
          # macOS runners reject deletion of the active default keychain.
          security default-keychain -s ~/Library/Keychains/login.keychain-db
          security delete-keychain "$KEYCHAIN_PATH" || true

      # ── Upload platform artifacts ──────────────────────────────
      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: beast-mac
          path: "release/BEAST X v*.dmg"

      - name: Upload Linux TGZ
        uses: actions/upload-artifact@v4
        with:
          name: beast-linux
          path: release/BEAST_X_v*.tgz


  # ───────────────────────────────────────────────────────────────────────────
  # 3. Build the Windows package on a native Windows runner.
  #
  #    jpackage (JDK 21) produces a self-contained app-image with a bundled
  #    Temurin 21 JRE.  A single jpackage invocation creates four launchers
  #    (BEAST, BEAUTi, TreeAnnotator, LogCombiner) sharing one JRE — so the
  #    ZIP is much smaller than four separate app-images would be.
  #    The runtime is automatically trimmed by jpackage's internal jlink to
  #    include only the modules the application actually uses.
  # ───────────────────────────────────────────────────────────────────────────
  windows-package:
    name: Package (Windows)
    needs: build-jars
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      # JDK 21 provides both the jpackage tool and the JRE that gets embedded
      # in the app-image.
      - name: Set up JDK 21 (jpackage + bundled runtime)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: beast-jars
          path: build/dist/

      - name: Set version env vars
        run: |
          echo "VERSION=${{ needs.build-jars.outputs.version }}"               >> "$GITHUB_ENV"
          echo "VERSION_NUMBER=${{ needs.build-jars.outputs.version_number }}" >> "$GITHUB_ENV"
          echo "EXTRA_TAG=${{ needs.build-jars.outputs.extra_tag }}"           >> "$GITHUB_ENV"

      # Each additional launcher (BEAUTi, TreeAnnotator, LogCombiner) is
      # described in a small properties file.  All four apps use the Windows
      # GUI subsystem (no console window), matching the previous launch4j
      # <headerType>gui</headerType> setting.
      # The heredoc content is indented to match the YAML block indentation;
      # the literal-block-scalar parser strips those leading spaces so the
      # resulting properties files contain no leading whitespace.
      - name: Write add-launcher properties files
        run: |
          cat > beauti.properties << 'EOF'
          main-class=dr.app.beauti.BeautiApp
          main-jar=beauti.jar
          java-options=-Xmx1024m
          icon=release/common/icons/beauti.ico
          win-console=false
          EOF

          cat > treeannotator.properties << 'EOF'
          main-class=dr.app.tools.treeannotator.TreeAnnotator
          main-jar=beast.jar
          java-options=-Xmx4096m
          icon=release/common/icons/utility.ico
          win-console=false
          EOF

          cat > logcombiner.properties << 'EOF'
          main-class=dr.app.tools.logcombiner.LogCombiner
          main-jar=beast.jar
          java-options=-Xmx2048m
          icon=release/common/icons/utility.ico
          win-console=false
          EOF

      # jpackage creates a self-contained app-image at staging/BEAST/.
      # --type app-image produces a directory (not an MSI installer) that can
      # be zipped with the same layout users are familiar with.
      # --app-version must be a dotted-numeric string (e.g. 10.5.1); the
      # pre-release tag (e.g. -beta7) is applied to the ZIP filename only.
      - name: Build Windows app-image with jpackage
        run: |
          mkdir -p jpackage-input staging release
          cp build/dist/beast.jar  jpackage-input/
          cp build/dist/beauti.jar jpackage-input/
          jpackage \
            --type app-image \
            --name "BEAST" \
            --app-version "$VERSION" \
            --vendor "BEAST Dev Team" \
            --input jpackage-input \
            --main-jar beast.jar \
            --main-class dr.app.beast.BeastMain \
            --java-options "-Xmx8192m" \
            --icon "release/common/icons/beast.ico" \
            --add-launcher "BEAUTi=beauti.properties" \
            --add-launcher "TreeAnnotator=treeannotator.properties" \
            --add-launcher "LogCombiner=logcombiner.properties" \
            --dest staging

      # Rename the staging directory to the versioned package name, then
      # add documentation and support files alongside the app-image.
      - name: Assemble final package directory
        run: |
          PKG_DIR="staging/BEAST X v${VERSION}${EXTRA_TAG}"
          mv "staging/BEAST" "$PKG_DIR"
          cp -r "release/common/doc"               "$PKG_DIR/doc"
          cp -r examples                           "$PKG_DIR/examples"
          cp -r native                             "$PKG_DIR/native"
          cp "release/common/VERSION HISTORY.txt"  "$PKG_DIR/"
          cp "release/common/README.txt"           "$PKG_DIR/"

      - name: Create Windows ZIP
        run: |
          cd staging
          7z a "../release/BEAST X v${VERSION}${EXTRA_TAG}.zip" \
            "BEAST X v${VERSION}${EXTRA_TAG}/"

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: beast-windows
          path: "release/BEAST X v*.zip"


  # ───────────────────────────────────────────────────────────────────────────
  # 4. Create a draft GitHub Release and attach the four archives.
  #
  #    The release is created as a draft so you can review the artefacts and
  #    edit the release notes before publishing.  Pre-release tags (those
  #    containing a hyphen, e.g. v10.5.1-beta4) are flagged as pre-releases.
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-jars, package, windows-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: beast-mac
          path: release-files/
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: beast-windows
          path: release-files/
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: beast-linux
          path: release-files/
          merge-multiple: true

      - name: List release files
        run: ls -lh release-files/

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          name: "BEAST X v${{ needs.build-jars.outputs.version }}${{ needs.build-jars.outputs.extra_tag }}"
          draft: true
          prerelease: ${{ needs.build-jars.outputs.extra_tag != '' }}
          generate_release_notes: true
          files: |
            release-files/*.dmg
            release-files/*.zip
            release-files/*.tgz
