# ─────────────────────────────────────────────────────────────────────────────
# BEAST X — Release workflow
#
# Triggered by pushing a version tag (e.g. v10.5.1 or v10.5.1-beta4).
#
# Jobs
# ────
#  build-jars        ubuntu-latest   Compile Java sources, upload beast.jar /
#                                    beauti.jar as a reusable artifact.
#
#  package           macos-latest    Download JARs, then produce all three
#                                    platform packages in one runner:
#                                      • Mac   – .app bundles → signed DMG → notarised
#                                      • Windows – .exe wrappers (cross-compiled
#                                        with the bundled macOS launch4j) → ZIP
#                                      • Linux   – shell scripts + JARs → GNU-tar TGZ
#
#  release           ubuntu-latest   Create a (draft) GitHub Release and attach
#                                    the three platform archives.
#
# Required GitHub repository secrets
# ────────────────────────────────────
#  MACOS_APP_CERT                Base64-encoded Developer ID Application .p12
#                                  openssl pkcs12 -export ... | base64 | pbcopy
#  MACOS_APP_CERT_PASSWORD       Password used when exporting the .p12
#  MACOS_INSTALLER_CERT          Base64-encoded Developer ID Installer .p12
#                                  (used to sign the final DMG file)
#  MACOS_INSTALLER_CERT_PASSWORD Password for the installer .p12
#  KEYCHAIN_PASSWORD             Any random string; used for the temporary
#                                  CI keychain (never leaves the runner)
#  APPLE_NOTARIZE_APPLE_ID       Apple ID email address (e.g. user@example.com)
#  APPLE_NOTARIZE_TEAM_ID        10-character Apple Team ID (e.g. LC992Z5R7E)
#  APPLE_NOTARIZE_PASSWORD       App-specific password from appleid.apple.com
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v*'

# Only one release pipeline runs at a time; a newer tag cancels the old one.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # 1. Compile Java sources and upload the JARs as an artifact.
  #    Using the cheapest runner for the CPU-heavy compilation step.
  # ───────────────────────────────────────────────────────────────────────────
  build-jars:
    name: Build JARs
    runs-on: ubuntu-latest

    outputs:
      version:       ${{ steps.parse-tag.outputs.version }}
      version_number: ${{ steps.parse-tag.outputs.version_number }}
      extra_tag:     ${{ steps.parse-tag.outputs.extra_tag }}

    steps:
      - uses: actions/checkout@v4

      # Java 11 is used for compilation; source/target compatibility is set to
      # 1.8 inside build.xml so the output JARs run on Java 8+.
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Parse the tag into its component parts:
      #   v10.5.1-beta4  →  version=10.5.1  extra_tag=-beta4
      #   v10.5.1        →  version=10.5.1  extra_tag=
      - name: Parse version from tag
        id: parse-tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="${TAG%%-*}"          # everything before the first hyphen
          if [[ "$TAG" == *"-"* ]]; then
            EXTRA_TAG="-${TAG#*-}"     # everything after the first hyphen
          else
            EXTRA_TAG=""
          fi
          echo "version=$VERSION"        >> "$GITHUB_OUTPUT"
          echo "version_number=$VERSION" >> "$GITHUB_OUTPUT"
          echo "extra_tag=$EXTRA_TAG"    >> "$GITHUB_OUTPUT"
          echo "Parsed: version=$VERSION  extra_tag=$EXTRA_TAG"

      - name: Build JARs (ant dist)
        run: |
          ant -f build.xml dist \
            -Dversion="${{ steps.parse-tag.outputs.version }}" \
            -Dversion_number="${{ steps.parse-tag.outputs.version_number }}"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: beast-jars
          path: build/dist/
          retention-days: 1


  # ───────────────────────────────────────────────────────────────────────────
  # 2. Build all three platform packages on a single macOS runner.
  #
  #    • The repo ships the macOS edition of launch4j (bin/ld and bin/windres
  #      are macOS x86_64 Mach-O binaries) which cross-compiles Windows EXEs.
  #    • GNU tar format is used for the Linux archive (set in build_release.xml)
  #      so the tarball is compatible with Linux GNU tar regardless of the host.
  #    • Mac .app bundles are signed with Hardened Runtime (--options runtime)
  #      and a custom entitlements plist so Apple's notarisation service accepts
  #      them.
  # ───────────────────────────────────────────────────────────────────────────
  package:
    name: Package (Mac · Windows · Linux)
    needs: build-jars
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11 (ANT runtime)
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Restore the JARs built in job 1
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: beast-jars
          path: build/dist/

      # ── Convenience variables ──────────────────────────────────
      - name: Set version env vars
        run: |
          echo "VERSION=${{ needs.build-jars.outputs.version }}"                  >> "$GITHUB_ENV"
          echo "VERSION_NUMBER=${{ needs.build-jars.outputs.version_number }}"    >> "$GITHUB_ENV"
          echo "EXTRA_TAG=${{ needs.build-jars.outputs.extra_tag }}"              >> "$GITHUB_ENV"

      # ── launch4j native helpers must be executable ─────────────
      - name: Make launch4j binaries executable
        run: chmod +x packaging_tools/windows/launch4j/bin/ld packaging_tools/windows/launch4j/bin/windres

      # ── Windows packaging ──────────────────────────────────────
      - name: Package Windows (.exe + ZIP)
        run: |
          ant -f build_release.xml package-windows \
            -Dversion="$VERSION" \
            -Dversion_number="$VERSION_NUMBER" \
            -Dextra_release_tag="$EXTRA_TAG" \
            -Ddist.dir=build/dist

      # ── Linux packaging ────────────────────────────────────────
      - name: Package Linux (TGZ)
        run: |
          ant -f build_release.xml package-linux \
            -Dversion="$VERSION" \
            -Dversion_number="$VERSION_NUMBER" \
            -Dextra_release_tag="$EXTRA_TAG" \
            -Ddist.dir=build/dist

      # ── Install Zulu 21 Universal JDK for embedding ───────────
      #
      # Azul Zulu's Homebrew cask installs a macOS universal binary
      # (fat binary containing both aarch64 and x86_64 slices).
      # macOS loads only the native slice at runtime, so the bundled JDK
      # is natively fast on both Apple Silicon and Intel with no Rosetta
      # overhead — and a single DMG covers both architectures.
      - name: Install Zulu 21 Universal JDK for bundling
        run: |
          brew install --cask zulu@21
          echo "JDK_BUNDLE_DIR=/Library/Java/JavaVirtualMachines/zulu-21.jdk" >> "$GITHUB_ENV"

      # ── Mac code-signing setup ─────────────────────────────────
      #
      # We import both certificates into a short-lived keychain that only
      # exists for the duration of this job.  All secrets stay in memory;
      # the decoded .p12 files are deleted immediately after import.
      - name: Create signing keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/beast-signing.keychain-db"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Keep unlocked for up to 6 hours (the notarisation wait can be slow)
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"

      - name: Import Developer ID Application certificate
        env:
          CERT_B64:  ${{ secrets.MACOS_APP_CERT }}
          CERT_PASS: ${{ secrets.MACOS_APP_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          printf '%s' "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/app_cert.p12"
          security import "$RUNNER_TEMP/app_cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASS" \
            -T /usr/bin/codesign
          rm -f "$RUNNER_TEMP/app_cert.p12"
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Import Developer ID Installer certificate
        env:
          CERT_B64:  ${{ secrets.MACOS_INSTALLER_CERT }}
          CERT_PASS: ${{ secrets.MACOS_INSTALLER_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          printf '%s' "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/installer_cert.p12"
          security import "$RUNNER_TEMP/installer_cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASS" \
            -T /usr/bin/codesign
          rm -f "$RUNNER_TEMP/installer_cert.p12"
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      # Derive the full identity strings from the imported certs so we do not
      # have to hard-code them in the workflow or in a secret.
      - name: Resolve signing identities
        run: |
          APP_SIGNER=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" \
            | head -1 \
            | awk '{print $2}')
          echo "APP_SIGNER=$APP_SIGNER" >> "$GITHUB_ENV"
          echo "Resolved Application signer: $APP_SIGNER"

      # ── Mac packaging ──────────────────────────────────────────
      # Step 1: create .app bundles with Temurin 21 embedded in each
      #         Contents/PlugIns/ directory (unsigned at this stage).
      - name: Create Mac .app bundles with embedded JDK (unsigned)
        run: |
          ant -f build_release.xml package-mac-bundled-jvm \
            -Dversion="$VERSION" \
            -Dversion_number="$VERSION_NUMBER" \
            -Dextra_release_tag="$EXTRA_TAG" \
            -Ddist.dir=build/dist \
            -Djdk.bundle.dir="$JDK_BUNDLE_DIR"

      # Step 2: sign each .app with Hardened Runtime + entitlements
      # (must happen before the DMG is created so the signed bundles
      #  are baked into the image that notarisation will validate)
      - name: Sign .app bundles
        run: |
          MAC_DIR="release/Mac/BEAST X v${VERSION}"
          for APP in \
            "BEAST v${VERSION}.app" \
            "BEAUti v${VERSION}.app" \
            "LogCombiner v${VERSION}.app" \
            "TreeAnnotator v${VERSION}.app"; do
            codesign \
              --deep --force \
              --options runtime \
              --entitlements packaging_tools/mac/entitlements.plist \
              --sign "$APP_SIGNER" \
              --verbose \
              "${MAC_DIR}/${APP}"
          done

      # Step 3: create the DMG from the now-signed staging directory
      - name: Create DMG
        run: |
          /usr/bin/hdiutil create -ov \
            -srcfolder "release/Mac/BEAST X v${VERSION}" \
            -volname "BEAST v${VERSION}" \
            "release/BEAST X v${VERSION}${EXTRA_TAG}.dmg"

      # Step 4: sign the DMG itself
      # (Developer ID Application cert; Installer certs are for .pkg only)
      - name: Sign DMG
        run: |
          codesign \
            --sign "$APP_SIGNER" \
            --verbose \
            "release/BEAST X v${VERSION}${EXTRA_TAG}.dmg"

      # ── Notarisation ───────────────────────────────────────────
      #
      # xcrun notarytool --wait blocks until Apple's service responds
      # (typically 2–10 minutes).  The workflow will fail here if the
      # submission is rejected, giving you clear feedback in the job log.
      - name: Notarise DMG
        env:
          APPLE_ID:       ${{ secrets.APPLE_NOTARIZE_APPLE_ID }}
          TEAM_ID:        ${{ secrets.APPLE_NOTARIZE_TEAM_ID }}
          NOTARIZE_PASS:  ${{ secrets.APPLE_NOTARIZE_PASSWORD }}
        run: |
          DMG="release/BEAST X v${VERSION}${EXTRA_TAG}.dmg"
          xcrun notarytool submit "$DMG" \
            --apple-id  "$APPLE_ID" \
            --team-id   "$TEAM_ID" \
            --password  "$NOTARIZE_PASS" \
            --wait \
            --output-format plist

      - name: Staple notarisation ticket to DMG
        run: |
          xcrun stapler staple "release/BEAST X v${VERSION}${EXTRA_TAG}.dmg"
          xcrun stapler validate "release/BEAST X v${VERSION}${EXTRA_TAG}.dmg"

      # ── Clean up keychain ──────────────────────────────────────
      - name: Delete signing keychain
        if: always()
        run: |
          # Restore the login keychain as default before deleting ours;
          # macOS runners reject deletion of the active default keychain.
          security default-keychain -s ~/Library/Keychains/login.keychain-db
          security delete-keychain "$KEYCHAIN_PATH" || true

      # ── Upload platform artifacts ──────────────────────────────
      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: beast-mac
          path: "release/BEAST X v*.dmg"

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: beast-windows
          path: "release/BEAST X v*.zip"

      - name: Upload Linux TGZ
        uses: actions/upload-artifact@v4
        with:
          name: beast-linux
          path: release/BEAST_X_v*.tgz


  # ───────────────────────────────────────────────────────────────────────────
  # 3. Create a draft GitHub Release and attach the three archives.
  #
  #    The release is created as a draft so you can review the artefacts and
  #    edit the release notes before publishing.  Pre-release tags (those
  #    containing a hyphen, e.g. v10.5.1-beta4) are flagged as pre-releases.
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-jars, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: beast-mac
          path: release-files/
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: beast-windows
          path: release-files/
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: beast-linux
          path: release-files/
          merge-multiple: true

      - name: List release files
        run: ls -lh release-files/

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          name: "BEAST X v${{ needs.build-jars.outputs.version }}${{ needs.build-jars.outputs.extra_tag }}"
          draft: true
          prerelease: ${{ needs.build-jars.outputs.extra_tag != '' }}
          generate_release_notes: true
          files: |
            release-files/*.dmg
            release-files/*.zip
            release-files/*.tgz
